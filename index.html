<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="icon" href="skillicons.png" type="image/png" />
  <link rel="stylesheet" type="text/css" href="nis/runeappslib.css"/>
  <script type="text/javascript" src="nis/runeappslib.js"></script>
  <script type="text/javascript" src="nis/alt1lib.js"></script>
  <script type="text/javascript" src="nis/imagedetect.js"></script>
  <script type="text/javascript" src="xpcounter.bundle.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Quattrocento+Sans:wght@400;700&display=swap');
    :root {
      /* RS3 NIS-authentic palette */
      --bg-deep:#0e0c09;--bg-panel:#16120e;--bg-inner:#1b1711;--bg-raised:#221c14;--bg-hover:#2a231a;--bg-active:#31291e;
      --bdr-outer:#2a2218;--bdr-inner:#4a3d2a;--bdr-gold:#7a6840;--bdr-bright:#b8964a;
      --gold:#c8a84e;--gold-bright:#e8c252;--gold-dim:#8b7340;--gold-glow:rgba(200,168,78,0.15);
      --text:#c8b89a;--text-bright:#e4d5b7;--text-dim:#7a6e5c;--text-faint:#4a4236;
      --green:#5b9b3e;--green-glow:rgba(91,155,62,0.5);--amber:#c89b2a;--amber-glow:rgba(200,155,42,0.5);--red:#9b3e3e;--red-glow:rgba(155,62,62,0.5);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Quattrocento Sans','Segoe UI',sans-serif;color:var(--text);background:var(--bg-deep);overflow:hidden;user-select:none;-webkit-user-select:none;font-size:clamp(13px,3.2vw,18px);}
    ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg-deep);border-radius:3px;}::-webkit-scrollbar-thumb{background:var(--bdr-inner);border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:var(--bdr-gold);}

    /* ── Frame with RS3 NIS beveled border ── */
    #frame{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-panel);border:1px solid var(--bdr-outer);}
    #frame::before{content:'';position:absolute;inset:1px;border:1px solid var(--bdr-inner);pointer-events:none;z-index:50;}
    /* Top-left highlight bevel */
    #frame::after{content:'';position:absolute;top:2px;left:2px;right:50%;bottom:50%;border-top:1px solid rgba(122,104,64,0.25);border-left:1px solid rgba(122,104,64,0.15);pointer-events:none;z-index:50;}

    /* ── Header ── */
    #topbar{display:flex;align-items:center;padding:6px 8px;background:linear-gradient(180deg,rgba(75,62,38,0.3) 0%,rgba(34,28,20,0.8) 100%);border-bottom:1px solid var(--bdr-outer);gap:6px;min-height:36px;cursor:default;position:relative;flex-shrink:0;}
    #topbar::before{content:'';position:absolute;top:0;left:8px;right:8px;height:1px;background:linear-gradient(90deg,transparent,var(--bdr-gold),transparent);}
    #topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(42,34,24,0.8),transparent);}

    #statusdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--text-faint);transition:background 0.3s,box-shadow 0.3s;}
    #statusdot.searching{background:var(--amber);box-shadow:0 0 6px var(--amber-glow);animation:pulse 1.5s ease-in-out infinite;}
    #statusdot.active{background:var(--green);box-shadow:0 0 6px var(--green-glow);}
    #statusdot.afk{background:var(--amber);box-shadow:0 0 6px var(--amber-glow);animation:pulse 2s ease-in-out infinite;}
    #statusdot.error{background:var(--red);box-shadow:0 0 6px var(--red-glow);}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

    #skillicon{width:24px;height:24px;background-image:url('skillicons.png');background-size:24px auto;flex-shrink:0;display:none;}
    #ratebox{flex:1;font-family:'Cinzel',serif;font-size:clamp(16px,4.5vw,26px);font-weight:600;color:var(--gold-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 3px rgba(0,0,0,0.7);cursor:pointer;letter-spacing:0.02em;}
    #ratebox:hover{filter:brightness(1.2);}
    #xpgained{font-size:clamp(11px,2.5vw,15px);color:var(--green);white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,0.5);font-weight:700;}
    #sessiontime{font-size:clamp(11px,2.5vw,15px);color:var(--text-dim);white-space:nowrap;cursor:pointer;padding:2px 6px;background:var(--bg-deep);border:1px solid var(--bdr-outer);border-radius:2px;transition:color 0.15s,border-color 0.15s;}
    #sessiontime:hover{color:var(--text-bright);border-color:var(--bdr-gold);}

    /* ── Dashboard (replaces tabs+panels) ── */
    #dashboard{flex:1;overflow-y:auto;overflow-x:hidden;}

    /* ── Compact Graph ── */
    #graphwrap{position:relative;height:80px;background:var(--bg-inner);border-bottom:1px solid var(--bdr-outer);flex-shrink:0;}
    #cnv{width:100%;height:100%;display:block;}
    #graphrate{position:absolute;top:4px;right:6px;font-family:'Cinzel',serif;font-size:clamp(12px,2.8vw,16px);font-weight:600;color:var(--gold-bright);text-shadow:0 1px 3px rgba(0,0,0,0.8);pointer-events:none;z-index:2;}
    #graphtimes{position:absolute;bottom:2px;left:0;right:0;display:flex;justify-content:space-between;padding:0 6px;font-size:clamp(9px,2.2vw,13px);color:var(--text-faint);pointer-events:none;z-index:2;}

    /* ── Skill rows ── */
    #skillslist{padding:2px 0;}
    .skillrow{display:flex;align-items:center;padding:5px 8px 5px 5px;background:var(--bg-inner);border:1px solid transparent;border-left:3px solid transparent;cursor:pointer;gap:6px;transition:background 0.15s,border-color 0.15s;}
    .skillrow:hover{background:var(--bg-hover);border-color:var(--bdr-outer);}
    .skillrow.selected{background:var(--bg-active);box-shadow:inset 0 0 10px var(--gold-glow);}
    .skillrow-icon{width:22px;height:22px;background-image:url('skillicons.png');background-size:22px auto;background-repeat:no-repeat;flex-shrink:0;}
    .skillrow-name{min-width:60px;font-size:clamp(13px,3vw,17px);color:var(--text-bright);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:0.01em;}
    .skillrow-rate{font-size:clamp(13px,3vw,17px);font-weight:700;color:var(--gold);white-space:nowrap;flex-shrink:0;margin-left:auto;}
    /* Inline goal bar */
    .skillrow-goalwrap{width:36px;flex-shrink:0;display:flex;align-items:center;gap:2px;}
    .skillrow-goalbar{flex:1;height:3px;background:var(--bg-deep);border:1px solid var(--bdr-outer);overflow:hidden;border-radius:1px;}
    .skillrow-goalfill{height:100%;transition:width 0.5s;}
    .skillrow-goalpct{font-size:clamp(10px,2.2vw,13px);color:var(--text-dim);}
    /* Goal ETA */
    .skillrow-eta{font-size:clamp(10px,2.2vw,13px);color:var(--gold-dim);white-space:nowrap;flex-shrink:0;}

    .empty-state{padding:12px 10px;font-size:11px;color:var(--text-faint);text-align:center;font-style:italic;}

    /* ── Gear button ── */
    #gearbtn{position:fixed;bottom:6px;right:6px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:var(--bg-raised);border:1px solid var(--bdr-inner);border-radius:3px;color:var(--text-dim);font-size:14px;cursor:pointer;z-index:20;transition:color 0.15s,border-color 0.15s,background 0.15s;}
    #gearbtn:hover{color:var(--gold);border-color:var(--bdr-gold);background:var(--bg-hover);}

    /* ── Overlay panel ── */
    #overlay{display:none;position:fixed;inset:0;z-index:60;background:rgba(10,8,6,0.85);}
    #overlay.open{display:flex;flex-direction:column;}
    #overlay-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:linear-gradient(180deg,rgba(75,62,38,0.3) 0%,transparent 100%),var(--bg-raised);border-bottom:1px solid var(--bdr-gold);}
    #overlay-header h3{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:0.08em;}
    #overlay-close{color:var(--text-dim);cursor:pointer;font-size:16px;padding:0 4px;transition:color 0.15s;}
    #overlay-close:hover{color:var(--text-bright);}
    #overlay-body{flex:1;overflow-y:auto;padding:6px 8px;}

    /* Collapsible sections */
    .ov-section{margin-bottom:4px;border:1px solid var(--bdr-outer);background:var(--bg-inner);}
    .ov-section-head{display:flex;align-items:center;padding:4px 8px;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;font-weight:600;color:var(--gold-dim);text-transform:uppercase;letter-spacing:0.06em;background:linear-gradient(180deg,rgba(75,62,38,0.15) 0%,transparent 100%);transition:color 0.15s;}
    .ov-section-head:hover{color:var(--gold);}
    .ov-section-head::before{content:'\25B6';font-size:7px;margin-right:6px;transition:transform 0.2s;color:var(--text-faint);}
    .ov-section.open .ov-section-head::before{transform:rotate(90deg);}
    .ov-section-body{display:none;padding:6px 8px;}
    .ov-section.open .ov-section-body{display:block;}

    /* ── Settings (inside overlay) ── */
    .setting-group{margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--bdr-outer);}
    .setting-group:last-child{border-bottom:none;}
    .setting-label{font-family:'Cinzel',serif;font-size:9px;font-weight:600;color:var(--gold-dim);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.08em;}
    .setting-row{display:flex;align-items:center;padding:2px 0;gap:6px;font-size:11px;}
    .setting-row label{cursor:pointer;}
    .setting-row input[type="range"]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--bdr-outer);border-radius:2px;outline:none;}
    .setting-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--gold);border-radius:50%;cursor:pointer;border:1px solid var(--bg-deep);box-shadow:0 0 4px var(--gold-glow);}
    .setting-row input[type="checkbox"],.setting-row input[type="radio"]{-webkit-appearance:none;appearance:none;width:13px;height:13px;background:var(--bg-panel);border:1px solid var(--bdr-inner);cursor:pointer;position:relative;flex-shrink:0;}
    .setting-row input[type="radio"]{border-radius:50%;}
    .setting-row input[type="checkbox"]:checked,.setting-row input[type="radio"]:checked{background:var(--bg-active);border-color:var(--gold);}
    .setting-row input[type="checkbox"]:checked::after{content:'';position:absolute;left:3px;top:1px;width:5px;height:8px;border:solid var(--gold);border-width:0 2px 2px 0;transform:rotate(45deg);}
    .setting-row input[type="radio"]:checked::after{content:'';position:absolute;left:3px;top:3px;width:5px;height:5px;background:var(--gold);border-radius:50%;}
    .btn{display:inline-block;padding:3px 10px;font-size:9px;font-family:'Cinzel',serif;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;background:linear-gradient(180deg,rgba(75,62,38,0.3) 0%,transparent 60%),var(--bg-raised);border:1px solid var(--bdr-inner);color:var(--text);cursor:pointer;margin-right:4px;margin-top:3px;transition:border-color 0.15s,color 0.15s;}
    .btn:hover{border-color:var(--bdr-gold);color:var(--gold);}
    .btn:active{background:var(--bg-active);border-color:var(--gold);}

    /* ── History (inside overlay) ── */
    .histrow{padding:4px 6px;margin-bottom:2px;background:var(--bg-raised);border:1px solid transparent;font-size:10px;}
    .histrow:hover{border-color:var(--bdr-outer);}
    .histrow-date{color:var(--text-dim);font-size:9px;margin-bottom:1px;}
    .histrow-stats{display:flex;gap:8px;}
    .histrow-stat{color:var(--text);}
    .histrow-stat span{color:var(--gold);font-weight:700;}

    /* ── Breakdown (inside overlay) ── */
    .bdrow{display:flex;align-items:center;padding:3px 5px;margin-bottom:1px;background:var(--bg-raised);font-size:10px;gap:6px;}
    .bdrow:hover{background:var(--bg-hover);}
    .bdrow-xp{flex:1;color:var(--text);}
    .bdrow-n{color:var(--text-dim);min-width:30px;text-align:right;font-weight:700;}
    .bdrow-track{color:var(--gold-dim);cursor:pointer;padding:0 3px;transition:color 0.15s;}
    .bdrow-track:hover{color:var(--gold-bright);}

    /* ── Notifications ── */
    #notifications{position:fixed;top:34px;right:6px;z-index:70;display:flex;flex-direction:column;gap:3px;pointer-events:none;}
    .notif{padding:3px 8px;font-size:10px;font-weight:700;border:1px solid;border-radius:2px;animation:notifIn 0.3s ease-out;pointer-events:auto;cursor:default;max-width:180px;text-shadow:0 1px 2px rgba(0,0,0,0.5);}
    .notif.gold{color:var(--gold-bright);border-color:var(--gold);background:rgba(35,30,23,0.95);}
    .notif.green{color:var(--green);border-color:var(--green);background:rgba(23,35,20,0.95);}
    .notif.amber{color:var(--amber);border-color:var(--amber);background:rgba(35,30,15,0.95);}
    @keyframes notifIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
    .notif.out{animation:notifOut 0.3s ease-in forwards;}
    @keyframes notifOut{to{opacity:0;transform:translateX(20px);}}

    /* ── Tracked badge & dropdown ── */
    #tracked{display:none;position:fixed;bottom:6px;left:6px;font-size:9px;color:var(--gold);background:rgba(14,12,9,0.9);border:1px solid var(--bdr-outer);padding:2px 6px;cursor:pointer;z-index:20;font-weight:700;}
    #tracked:hover{border-color:var(--gold);color:var(--gold-bright);}
    #skilldropdown{display:none;position:absolute;top:30px;left:4px;right:4px;background:var(--bg-raised);border:1px solid var(--bdr-gold);z-index:30;max-height:200px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,0.6);}
    #skilldropdown.open{display:block;}

    /* ── Goal context menu ── */
    #goalmenu{display:none;position:fixed;background:var(--bg-raised);border:1px solid var(--bdr-gold);padding:2px 0;z-index:80;min-width:130px;box-shadow:0 4px 16px rgba(0,0,0,0.6);}
    #goalmenu.open{display:block;}
    .goalmenu-opt{padding:4px 10px;font-size:10px;color:var(--text);cursor:pointer;transition:background 0.1s;}
    .goalmenu-opt:hover{background:var(--bg-hover);color:var(--gold);}
    .goalmenu-opt.disabled{color:var(--text-faint);cursor:default;}
    .goalmenu-opt.disabled:hover{background:transparent;color:var(--text-faint);}
    .goalmenu-opt.danger{color:var(--red);}
    .goalmenu-opt.danger:hover{background:rgba(155,62,62,0.1);color:#c45555;}
    .goalmenu-divider{height:1px;background:var(--bdr-outer);margin:2px 0;}

    /* ── Noise texture ── */
    #noise{position:fixed;inset:0;pointer-events:none;z-index:100;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px;}
  </style>
</head>
<body class="nis" onload="start()" onresize="resize();">
  <div id="noise"></div>
  <div id="notifications"></div>

  <div id="frame">
    <div id="topbar">
      <div id="statusdot"></div>
      <div id="skillicon"></div>
      <div id="ratebox" onclick="toggleSkillDropdown()">-- xp/hr</div>
      <div id="xpgained"></div>
      <div id="sessiontime" onclick="clickTimer()" ondblclick="dblClickTimer()" title="Click: toggle mode&#10;Double-click: reset"></div>
    </div>
    <div id="skilldropdown"></div>

    <div id="dashboard">
      <!-- Compact graph -->
      <div id="graphwrap">
        <canvas id="cnv"></canvas>
        <div id="graphrate"></div>
        <div id="graphtimes"></div>
      </div>
      <!-- Active skills list -->
      <div id="skillslist"></div>
    </div>
  </div>

  <!-- Gear button -->
  <div id="gearbtn" onclick="toggleOverlay()" title="Settings, History & Drops">&#9881;</div>

  <!-- Overlay panel -->
  <div id="overlay">
    <div id="overlay-header">
      <h3>Menu</h3>
      <span id="overlay-close" onclick="toggleOverlay()">&times;</span>
    </div>
    <div id="overlay-body">
      <!-- Settings section -->
      <div class="ov-section open" data-section="settings">
        <div class="ov-section-head" onclick="toggleSection(this)">Settings</div>
        <div class="ov-section-body">
          <div class="setting-group">
            <div class="setting-label">Tracking Mode</div>
            <div class="setting-row"><label><input type="radio" name="mode" value="fixed" onchange="setMode('fixed')"> Fixed duration</label></div>
            <div class="setting-row"><label><input type="radio" name="mode" value="start" onchange="setMode('start')"> Since start</label></div>
            <div class="setting-row"><span>Duration:</span><input type="range" id="durationSlider" min="1" max="120" value="10" oninput="setFixedDuration(this.value)"><span id="durationLabel" style="min-width:38px;text-align:right;color:var(--gold)">10 min</span></div>
            <span class="btn" onclick="resetStartPoint()">Reset</span>
            <span class="btn" onclick="startFindCounter()">Re-scan</span>
          </div>
          <div class="setting-group">
            <div class="setting-label">AFK Alert</div>
            <div class="setting-row"><label><input type="checkbox" id="afkToggle" onchange="toggleAfkAlert()"> Enable alert</label></div>
            <div class="setting-row"><span>After:</span><input type="range" id="afkSlider" min="20" max="300" step="10" value="120" oninput="setAfkTime(this.value)"><span id="afkLabel" style="min-width:38px;text-align:right;color:var(--gold)">120 s</span></div>
          </div>
          <div class="setting-group">
            <div class="setting-label">Data</div>
            <span class="btn" onclick="clearAllData()">Clear all data</span>
            <span class="btn" onclick="saveSession()">Save session</span>
          </div>
        </div>
      </div>
      <!-- History section -->
      <div class="ov-section" data-section="history">
        <div class="ov-section-head" onclick="toggleSection(this)">History</div>
        <div class="ov-section-body" id="historypanel"></div>
      </div>
      <!-- Drops section -->
      <div class="ov-section" data-section="drops">
        <div class="ov-section-head" onclick="toggleSection(this)">Drops</div>
        <div class="ov-section-body" id="breakdownpanel"></div>
      </div>
    </div>
  </div>

  <!-- Tracked badge -->
  <div id="tracked" onclick="trackxp(0)"></div>

  <!-- Goal context menu -->
  <div id="goalmenu"></div>

  <div style="display:none"><audio id="alerter" preload="auto"><source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=" type="audio/wav"></audio></div>

  <script>
  "use strict";

  /* ================================================================
     XP METER IMPROVED v3 – Dashboard layout, RS3 NIS-styled
     Built on the original working xpmeter. Pure vanilla JS.
     ================================================================ */

  // ─── Skill definitions ───
  // skillnames and fullskillnames are globals from runeappslib.js
  // skillnames = ["tot","att","str","ran","mag","def","hpx","pra","sum","dun","agi","thi","sla","hun","smi","cra","fle","her","run","coo","con","fir","woo","far","fis","min","div","inv","arc","nec"]
  // fullskillnames = ["Total","Attack","Strength",...]
  // com (combat) is special — sprite index 31
  function skillName(id){
    var i=skillnames.indexOf(id);
    if(i>=0&&i<fullskillnames.length)return fullskillnames[i];
    if(id==="com")return"Combat";
    return id;
  }

  // Muted skill colors — desaturated to blend with the NIS UI
  var skillcolors={
    att:{l:"#a04040",f:"rgba(160,64,64,",g:"rgba(160,64,64,0.3)"},
    def:{l:"#6078a8",f:"rgba(96,120,168,",g:"rgba(96,120,168,0.3)"},
    str:{l:"#4a8a4a",f:"rgba(74,138,74,",g:"rgba(74,138,74,0.3)"},
    hpx:{l:"#a0a098",f:"rgba(160,160,152,",g:"rgba(160,160,152,0.25)"},
    ran:{l:"#5a8840",f:"rgba(90,136,64,",g:"rgba(90,136,64,0.3)"},
    pra:{l:"#a8a880",f:"rgba(168,168,128,",g:"rgba(168,168,128,0.25)"},
    mag:{l:"#5868a8",f:"rgba(88,104,168,",g:"rgba(88,104,168,0.3)"},
    coo:{l:"#884878",f:"rgba(136,72,120,",g:"rgba(136,72,120,0.3)"},
    woo:{l:"#8a7848",f:"rgba(138,120,72,",g:"rgba(138,120,72,0.3)"},
    fle:{l:"#308888",f:"rgba(48,136,136,",g:"rgba(48,136,136,0.3)"},
    fis:{l:"#5880a0",f:"rgba(88,128,160,",g:"rgba(88,128,160,0.3)"},
    fir:{l:"#a87830",f:"rgba(168,120,48,",g:"rgba(168,120,48,0.3)"},
    cra:{l:"#988868",f:"rgba(152,136,104,",g:"rgba(152,136,104,0.25)"},
    smi:{l:"#888888",f:"rgba(136,136,136,",g:"rgba(136,136,136,0.25)"},
    min:{l:"#608898",f:"rgba(96,136,152,",g:"rgba(96,136,152,0.3)"},
    her:{l:"#309060",f:"rgba(48,144,96,",g:"rgba(48,144,96,0.3)"},
    agi:{l:"#385890",f:"rgba(56,88,144,",g:"rgba(56,88,144,0.3)"},
    thi:{l:"#884888",f:"rgba(136,72,136,",g:"rgba(136,72,136,0.3)"},
    sla:{l:"#606060",f:"rgba(96,96,96,",g:"rgba(96,96,96,0.3)"},

  // ─── XP Table (RS3 levels 1-120 + virtual to 126) ───
  var xpTable=[0,0,83,174,276,388,512,650,801,969,1154,1358,1584,1833,2107,2411,2746,3115,3523,3973,4470,5018,5624,6291,7028,7842,8740,9730,10824,12031,13363,14833,16456,18247,20224,22406,24815,27473,30408,33648,37224,41171,45529,50339,55649,61512,67983,75127,83014,91721,101333,111945,123660,136594,150872,166636,184040,203254,224466,247886,273742,302288,333804,368599,407015,449428,496254,547953,605032,668051,737627,814445,899257,992895,1096278,1210421,1336443,1475581,1629200,1798808,1986068,2192818,2421087,2673114,2951373,3258594,3597792,3972294,4385776,4842295,5346332,5902831,6517253,7195629,7944614,8771558,9684577,10692629,11805606,13034431,14391160,15889109,17542976,19368992,21385073,23611006,26068632,28782069,31777943,35085654,38737661,42769801,47221641,52136869,57563718,63555443,70170840,77474828,85539082,94442737,104273167];
  function xpForLevel(lv){return lv<1?0:(lv>=xpTable.length?xpTable[xpTable.length-1]:xpTable[lv]);}

  // ─── State ───
  var hist={},reader=new XpcounterReader.XpcounterReader();
  var measuretime=0,graphtime=0,currenttime=0,trackedxp=0,measurestart=Date.now(),lastdraw=0,lastchange=0,findfails=0;
  var totalSessionXp={},lastgraphstart=0,lastgraphend=0,lastgraphskill="";
  var overlayOpen=false;
  var goalMenuSkill="";

  // ─── Settings ───
  var mode=localStorage.xpmeter_mode==="start"?"start":"fixed";

  var deletetime=4*60*60*1000,cnv=null,ctx=null;
  var tooltiptimeout=null,tooltipout=false,dropdownOpen=false;

  // ─── Helpers ───
  function elid(id){return document.getElementById(id);}
  function spacednr(n){if(isNaN(n)||!isFinite(n))return"0";n=Math.round(n);var s=n.toString(),r="";for(var i=0;i<s.length;i++){if(i>0&&(s.length-i)%3===0)r+=",";r+=s[i];}return r;}
  function shortxp(n){if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return Math.round(n).toString();}
  function displaytime(ms){var t=Math.floor(ms/1000),s=t%60,m=Math.floor(t/60)%60,h=Math.floor(t/3600),p=function(n){return n<10?"0"+n:""+n;};if(h===0)return m+":"+p(s);return h+":"+p(m)+":"+p(s);}
  function etaStr(ms){if(!isFinite(ms)||ms<=0)return"--";var h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);if(h>99)return">99h";if(h>0)return h+"h "+m+"m";return m+"m";}
  function floorx(v,step){return Math.floor(v/step)*step;}

  // ─── Lifecycle ───

  function startFindCounter(){
    setStatus("searching");elid("ratebox").textContent="Searching\u2026";
    if(!reader.searching)reader.pos=null;
    reader.findAsync(function(){
      reader.read();
      var found=false;for(var a in reader.skills)if(reader.values[a]>0)found=true;
      if(!found)reader.pos=null;
      if(!reader.pos){findfails++;if(findfails>=2){setStatus("error");elid("ratebox").textContent="Not found";}}
      else{findfails=0;setStatus("active");if(typeof reader.showPosition==="function")reader.showPosition();}
      if(reader.rounded)xpcounterRoundError();
      tick();
    });
  }

  function tick(){
    if(!reader.pos){if(reader.searching){setStatus("searching");elid("ratebox").textContent="Searching\u2026";}return;}
    currenttime=Date.now();fixintervals();reader.read();
    if(!skillid&&reader.skills[0])skillid=reader.skills[0];
    for(var a in hist)hist[a].visible=false;
    for(var a=0;a<reader.skills.length;a++){
      if(!reader.skills[a])continue;if(reader.values[a]===-1)continue;
      skillread(reader.skills[a],reader.values[a],currenttime);
      if(hist[reader.skills[a]])hist[reader.skills[a]].visible=true;
    }
    drawmeter();drawgraph();fixAfkAlert();updateXpGained();
  }

  // ─── Core: skill reading ───
  function skillread(skill,xp,time){
    if(!hist[skill])hist[skill]={id:skill,offcount:0,data:[],visible:true};
    var obj=hist[skill],last=obj.data[obj.data.length-1];
    if(!last)last={xp:0,time:0};
    var dxp=xp-last.xp;if(dxp===0)return;
    var expected=dxp>0&&dxp<200000;
    if(last.xp===0||obj.offcount>10||expected){
      if(!expected&&dxp!==0){for(var b=0;b<obj.data.length;b++)obj.data[b].xp+=dxp;}
      obj.data.push({xp:xp,time:time});obj.offcount=0;
      if(expected&&dxp>0){
        if(!totalSessionXp[skill])totalSessionXp[skill]=0;
        totalSessionXp[skill]+=dxp;
        // notifications removed — were firing spuriously
      }
    }else{obj.offcount++;}
    if(skill===skillid&&dxp!==0)lastchange=currenttime;
  }


  // ─── Rate calculation ───
  function calcmeter(histData,doclusters,time){
    var xpgain=0,clusters=[],ms=time-measuretime,ds=time-deletetime;
    for(var a=0;a<histData.length;a++){
      var last=histData[a===0?0:a-1],pnt=histData[a];
      if(pnt.time<ds){histData.splice(a,1);a--;continue;}
      if(pnt.time<ms)continue;
      var dxp=pnt.xp-last.xp;xpgain+=dxp;
      if(doclusters&&dxp>=1){
        var found=false;
        for(var b=0;b<clusters.length;b++){if(Math.abs(clusters[b].xp-dxp)<dxp/50+1){clusters[b].n++;clusters[b].mass+=dxp;clusters[b].xp=(clusters[b].xp*(clusters[b].n-1)+dxp)/clusters[b].n;found=true;break;}}
        if(!found)clusters.push({n:1,xp:dxp,mass:dxp});
      }
    }
    if(doclusters){clusters.sort(function(a,b){return a.xp-b.xp;});for(var a=clusters.length-1;a>=0;a--)combinecluster(clusters[a].xp,clusters[a],clusters,0);clusters.sort(function(a,b){return b.n-a.n;});}
    var xprate=measuretime>0?xpgain*3600000/measuretime:0;
    return{xpgain:xpgain,xprate:xprate,clusters:clusters};
  }
  function combinecluster(xp,cl,cls,layer){if(xp<5||layer>2)return;for(var b=cls.indexOf(cl);b>=0;b--){if(cls[b].n/7<cl.n)continue;var c=Math.round(xp/cls[b].xp);if(Math.abs(c*cls[b].xp-xp)<xp/50+1){cls[b].n+=c*cl.n;cls[b].mass+=c*xp;cls.splice(cls.indexOf(cl),1);return true;}}}
  function fixintervals(){if(mode==="fixed")measuretime=fixedtime;if(mode==="start")measuretime=currenttime-measurestart;measuretime=Math.min(measuretime,deletetime);graphtime=300;while(measuretime/80>graphtime)graphtime*=2;}

  // ─── Drawing ───
  function drawmeter(){
    var histobj=hist[skillid];
    if(!histobj){elid("ratebox").textContent="0 xp/hr";setSkillIcon(-1);return;}
    setStatus("active");

    var sc=skc(skillid);
    elid("ratebox").textContent=spacednr(rate.xprate)+" xp/hr";

    elid("graphrate").textContent=shortxp(rate.xprate)+"/hr";

  function drawSkillsPanel(){
    var panel=elid("skillslist"),html="";

      if(!hist[a].visible)continue;

      html+="<div class='skillrow-icon' style='background-position:0px "+(-22*off)+"px'></div>";
      html+="<div class='skillrow-name'>"+skillName(a)+"</div>";
      html+="<div class='skillrow-rate'>"+shortxp(rate.xprate)+"/hr</div>";
      // Inline goal bar
      if(goals[a]){
        var currentXp=0;
        if(hist[a]&&hist[a].data.length>0)currentXp=hist[a].data[hist[a].data.length-1].xp;
        var pct=goals[a].target>0?Math.min(100,(currentXp/goals[a].target)*100):0;
        var remaining=Math.max(0,goals[a].target-currentXp);
        var eta=rate.xprate>0?(remaining/rate.xprate*3600000):Infinity;
        html+="<div class='skillrow-goalwrap'>";
        html+="<div class='skillrow-goalbar'><div class='skillrow-goalfill' style='width:"+pct+"%;background:"+c.l+"'></div></div>";

  // ─── Session history ───
  function saveSession(){
    var summary={date:Date.now(),duration:measuretime,skills:{}};
    for(var s in totalSessionXp){
      if(totalSessionXp[s]>0){
        var rate=hist[s]?calcmeter(hist[s].data,false,currenttime).xprate:0;
        summary.skills[s]={xp:totalSessionXp[s],rate:Math.round(rate)};
      }
    }

  // ─── Graph drawing (compact, with labels) ───
  function drawgraph(isResizing){
    if(!ctx)return;
    var startx=floorx(currenttime-measuretime,graphtime);
    var endx=floorx(currenttime-graphtime,graphtime);
    if(!isResizing&&startx===lastgraphstart&&endx===lastgraphend&&skillid===lastgraphskill)return;
    if(!hist[skillid])return;
    var wrap=elid("graphwrap");
    var w=wrap.offsetWidth,h=wrap.offsetHeight;
    if(h<20||w<20){cnv.style.visibility="hidden";return;}
    cnv.style.visibility="visible";cnv.width=w;cnv.height=h;
    var data=calcGraph(hist[skillid],startx,endx,graphtime);
    var graph=data.graph,max=Math.max(data.max,1);
    var sc=skc(skillid);

    // Background
    ctx.fillStyle="#1b1711";ctx.fillRect(0,0,w,h);

    // Grid — 2 horizontal lines
    ctx.strokeStyle="rgba(75,62,38,0.2)";ctx.lineWidth=1;
    for(var i=1;i<=2;i++){var gy=h*i/3;ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(w,gy);ctx.stroke();}

    if(graph.length>1){
      // Gradient fill — warm gold, subtle
      var grad=ctx.createLinearGradient(0,0,0,h);
      grad.addColorStop(0,"rgba(168,144,80,0.18)");grad.addColorStop(0.6,"rgba(168,144,80,0.04)");grad.addColorStop(1,"rgba(168,144,80,0)");
      ctx.fillStyle=grad;ctx.beginPath();
      ctx.moveTo((graph[0].t-startx)/(endx-startx)*w,h);
      for(var a=0;a<graph.length;a++)ctx.lineTo((graph[a].t-startx)/(endx-startx)*w,(h-2)-(graph[a].v)/max*(h-8));
      ctx.lineTo((graph[graph.length-1].t-startx)/(endx-startx)*w,h);ctx.closePath();ctx.fill();

      // Line — warm cream/gold, soft glow
      ctx.shadowColor="rgba(200,168,78,0.25)";ctx.shadowBlur=4;ctx.strokeStyle="#c8b078";ctx.lineWidth=1.5;ctx.lineJoin="round";ctx.lineCap="round";ctx.beginPath();
      for(var a=0;a<graph.length;a++)ctx.lineTo((graph[a].t-startx)/(endx-startx)*w,(h-2)-(graph[a].v)/max*(h-8));
      ctx.stroke();ctx.shadowBlur=0;
    }
    // Frame
    ctx.strokeStyle="rgba(42,34,24,0.6)";ctx.lineWidth=1;ctx.strokeRect(0.5,0.5,w-1,h-1);

    // Time labels
    drawGraphTimeLabels(startx,endx);

    lastgraphstart=startx;lastgraphend=endx;lastgraphskill=skillid;
  }

  function drawGraphTimeLabels(startx,endx){
    var el=elid("graphtimes");
    var span=(endx-startx)/1000;// seconds
    var labels=[];
    var steps=5;
    for(var i=0;i<=steps;i++){
      var t=Math.round(-span*(1-i/steps));
      if(t===0)labels.push("now");
      else if(t>-60)labels.push(t+"s");
      else labels.push(Math.round(t/60)+"m");
    }
    el.innerHTML=labels.map(function(l){return"<span>"+l+"</span>";}).join("");
  }

  function calcGraph(counter,startx,endx,graphstep){
    var min=Infinity,max=-Infinity,graph=[],last=-1,lastindex=0;
    for(var a=0;a<counter.data.length;a++){if(counter.data[a].time>startx&&last!==-1)break;last=counter.data[a].xp;lastindex=a;}
    for(var bound=startx;bound<=endx;bound+=graphstep){
      var b=last;for(var a=lastindex;a<counter.data.length;a++){if(counter.data[a].time<=bound)continue;if(counter.data[a].time>bound+graphstep)break;b=counter.data[a].xp;lastindex=0;}
      b-=last;last=last+b;if(b>max)max=b;if(b<min)min=b;graph.push({t:bound,v:b});
    }
    return{graph:graph,min:min,max:max,step:graphstep};
  }

  // ─── UI ───
  function setSkillIcon(id){var el=elid("skillicon"),off=typeof id==="string"?iconoffset(id):id;if(off===-1||off===undefined){el.style.display="none";}else{el.style.backgroundPosition="0px "+(-24*off)+"px";el.style.display="block";}}
  function setStatus(s){elid("statusdot").className=s;}
  function updateXpGained(){var total=0;for(var k in totalSessionXp)total+=totalSessionXp[k];if(total>0)elid("xpgained").textContent="+"+shortxp(total);}

  function toggleSkillDropdown(){
    if(!reader.pos){startFindCounter();return;}
    dropdownOpen=!dropdownOpen;var dd=elid("skilldropdown");
    if(dropdownOpen){
      dd.classList.add("open");var html="";
      for(var a in hist){if(!hist[a].visible||a===skillid)continue;var off=iconoffset(a),rate=calcmeter(hist[a].data,false,currenttime),c=skc(a);
        html+="<div class='skillrow' style='border-left-color:"+c.l+"' onclick='setcounter(\""+a+"\");toggleSkillDropdown();'><div class='skillrow-icon' style='background-position:0px "+(-22*off)+"px'></div><div class='skillrow-name'>"+skillName(a)+"</div><div class='skillrow-rate'>"+spacednr(rate.xprate)+"/hr</div></div>";}
      if(!html)html="<div class='empty-state'>No other skills</div>";dd.innerHTML=html;
    }else{dd.classList.remove("open");}
  }

  function setcounter(id){skillid=id;dropdownOpen=false;elid("skilldropdown").classList.remove("open");drawmeter();drawgraph(true);}
  function trackxp(xp){trackedxp=xp;if(!xp)elid("tracked").style.display="none";drawmeter();}

  function resize(){
    drawgraph(true);
  }

  // ─── Overlay ───
  function toggleOverlay(){
    overlayOpen=!overlayOpen;
    var el=elid("overlay");
    if(overlayOpen){el.classList.add("open");}
    else{el.classList.remove("open");}
  }

  function toggleSection(headEl){
    var section=headEl.parentElement;
    section.classList.toggle("open");
  }

  // ─── Controls ───
  function setMode(m){mode=m;localStorage.xpmeter_mode=m;fixintervals();drawmeter();drawgraph(true);}
  function clickTimer(){setMode(mode==="fixed"?"start":"fixed");document.querySelectorAll('input[name="mode"]').forEach(function(r){r.checked=r.value===mode;});}
  function dblClickTimer(){measurestart=Date.now()-1;setMode("start");}
  function resetStartPoint(){measurestart=Date.now()-1;totalSessionXp={};elid("xpgained").textContent="";fixintervals();drawmeter();drawgraph(true);}
  function setFixedDuration(min){fixedtime=min*60000;localStorage.xpmeter_sampletime=fixedtime;elid("durationLabel").textContent=min+" min";fixintervals();drawmeter();drawgraph(true);}
  function toggleAfkAlert(){afkAlertEnabled=elid("afkToggle").checked;localStorage.xpmeter_afk=afkAlertEnabled?"true":"false";fixAfkAlert();}
  function setAfkTime(sec){afkAlertTime=sec*1000;localStorage.xpmeter_afktime=afkAlertTime;elid("afkLabel").textContent=sec+" s";}
  function clearAllData(){localStorage.removeItem("xpmeter_goals");localStorage.removeItem("xpmeter_history");goals={};sessionHistory=[];drawHistoryPanel();drawSkillsPanel();showNotif("Data cleared","amber");}

  function fixAfkAlert(){
    if(!afkAlertEnabled||!lastchange){if(tooltipout&&typeof alt1!=="undefined"){alt1.clearTooltip();tooltipout=false;}if(tooltiptimeout){clearTimeout(tooltiptimeout);tooltiptimeout=null;}return;}
    var next=lastchange+afkAlertTime;if(tooltiptimeout){clearTimeout(tooltiptimeout);tooltiptimeout=null;}
    if(next<=Date.now()){if(!tooltipout){if(typeof alt1!=="undefined")alt1.setTooltip("No XP gained! Check RuneScape");setStatus("afk");tooltipout=true;}}
    else{if(tooltipout){if(typeof alt1!=="undefined")alt1.clearTooltip();tooltipout=false;setStatus("active");}tooltiptimeout=setTimeout(fixAfkAlert,next-Date.now()+50);}
  }

  function xpcounterRoundError(){if(localStorage.xpmeter_roundwarning==="true")return;var msg="Enable 'show precise values' in RuneMetrics settings for accurate tracking.";if(typeof alt1!=="undefined"){alt1.setTooltip(msg);setTimeout(function(){alt1.clearTooltip();},8000);}localStorage.xpmeter_roundwarning="true";}

  </script>
</body>
</html>
